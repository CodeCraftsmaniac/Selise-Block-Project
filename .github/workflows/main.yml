name: Build (main)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened

env:
  RUN_SONARQUBE: 'false'

jobs:
  initialization:
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    outputs:
      envvalue1: ${{ steps.setvar.outputs.envvar1 }}
    steps:
      - name: set value
        id: setvar
        run: |
          echo envvar1="$RUN_SONARQUBE" >> $GITHUB_OUTPUT

  # sonarqube-job:
  #   if: ${{ success() && needs.initialization.outputs.envvalue1=='true' }}
  #   uses: ./.github/workflows/2_sonar.yml
  #   secrets:
  #     SELISE_GITHUB_PAT: ${{ secrets.SELISE_GITHUB_PAT }}
  #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_GLOBAL }}
  #   needs: [initialization]

  ci-gate:
    name: CI Gate (lint, test, build)
    permissions:
      contents: read
    runs-on: ubuntu-latest
    needs: [initialization]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22.20.0
        uses: actions/setup-node@v4
        with:
          node-version: 22.20.0
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test (vitest non-watch)
        run: npm run test -- --run

      - name: Set environment file (.env.prod -> .env)
        env:
          BUILD_ENV: prod
        run: node set-env.cjs

      - name: Build
        run: npm run build

  cd-job:
    if: ${{ github.event_name == 'push' }}
    permissions:
      contents: read
      id-token: write
    needs: [ci-gate]
    uses: ./.github/workflows/3_web.yml
    with:
      CONTAINER_NAME: 'prod-$SERVICE_NAME-webclient'
      NAMESPACE: 'prod-$REPO_NAME'
      SERVICE_NAME: $SERVICE_NAME
      CI_BUILD: 'prod'
    secrets:
      SELISE_GITHUB_PAT: ${{ secrets.SELISE_GITHUB_PAT }}
      AZURE_CREDENTIALS: ${{ secrets.AZURE_AKS_BLOCKS_CONSTRUCT_CREDENTIALS }}
      AZURE_CONTAINER_REGISTRY: ${{ secrets.AZURE_BLOCKS_PROD_CONTAINER_REGISTRY }}
      ClUSTER_RESOURCE_GROUP: ${{ secrets.ClUSTER_AKS_BLOCKS_PROD_RESOURCE_GROUP }}
      CLUSTER_NAME: ${{ secrets.AKS_BLOCKS_PROD_CLUSTER }}
      ACR_RESOURCE_GROUP: ${{ secrets.ClUSTER_AKS_BLOCKS_PROD_RESOURCE_GROUP }}
    # needs: [sonarqube-job]
  # storybook-job:
  #   if: ${{ github.event_name == 'push' }}
  #   permissions:
  #       contents: read
  #       id-token: write
  #   uses: ./.github/workflows/4_storybook.yml
  #   with:
  #     CONTAINER_NAME: 'prod-$SERVICE_NAME-storybook'
  #     NAMESPACE: 'prod-$REPO_NAME'
  #     SERVICE_NAME: $SERVICE_NAME
  #     CI_BUILD: 'storybook-prod'
